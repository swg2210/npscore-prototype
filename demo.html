<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네이버페이 스코어 · 플로우 데모</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1c1c1e;
      --bar-h: 56px;
      --shell-w: 375px;
      --shell-h: 812px;
    }

    body {
      background: var(--bg);
      font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Top toggle bar ── */
    .toggle-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--bar-h);
      background: rgba(28,28,30,0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      gap: 6px; z-index: 100; padding: 0 20px;
    }
    .tb-label {
      font-size: 11px; color: #666; font-weight: 700;
      letter-spacing: 0.8px; text-transform: uppercase;
      margin-right: 4px; white-space: nowrap;
    }
    .tb-btn {
      padding: 6px 14px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: transparent;
      color: #888;
      font-size: 12px; font-weight: 600; border-radius: 20px;
      cursor: pointer; white-space: nowrap; letter-spacing: -0.2px;
      font-family: inherit;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .tb-btn:hover { border-color: rgba(255,255,255,0.3); color: #bbb; }
    .tb-btn.active {
      background: #fff; border-color: #fff; color: #1a1a1a;
    }
    .tb-sep {
      width: 1px; height: 20px;
      background: rgba(255,255,255,0.1);
      margin: 0 4px;
    }

    /* ── Device shell ── */
    .stage {
      padding-top: calc(var(--bar-h) + 32px);
      padding-bottom: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
    }
    .case-label {
      font-size: 11px; font-weight: 700; color: #555;
      letter-spacing: 0.6px; text-transform: uppercase;
    }
    .device-shell {
      width: var(--shell-w);
      height: var(--shell-h);
      border-radius: 44px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 32px 80px rgba(0,0,0,0.6),
        0 8px 24px rgba(0,0,0,0.4);
      background: #000;
      position: relative;
    }
    .device-shell iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }

    /* Loading overlay */
    .loading-overlay {
      position: absolute; inset: 0;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .loading-overlay.visible { opacity: 1; pointer-events: auto; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #eee; border-top-color: #03C75A;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="toggle-bar">
    <span class="tb-label">케이스</span>
    <button class="tb-btn" data-nav="main-pre">메인 · 생성전</button>
    <button class="tb-btn active" data-nav="main-done">메인 · 생성완료</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" data-nav="score-pre">스코어 · 생성전</button>
    <button class="tb-btn" data-nav="score-done">스코어 · 생성완료</button>
  </div>

  <div class="stage">
    <div class="case-label" id="case-label">메인 · 생성완료</div>
    <div class="device-shell">
      <iframe id="demo-frame" src="https://swg2210.github.io/npscore-prototype/" title="데모"></iframe>
      <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <script>
    const URLS = {
      'main-pre':   'https://swg2210.github.io/npscore-prototype/?case=pre',
      'main-done':  'https://swg2210.github.io/npscore-prototype/',
      'score-pre':  'https://swg2210.github.io/socre/',
      'score-done': 'https://swg2210.github.io/socre/index.html?revealed=1'
    };
    const LABELS = {
      'main-pre':   '메인 · 생성전',
      'main-done':  '메인 · 생성완료',
      'score-pre':  '스코어 · 생성전',
      'score-done': '스코어 · 생성완료'
    };

    const frame   = document.getElementById('demo-frame');
    const overlay = document.getElementById('loading-overlay');
    const label   = document.getElementById('case-label');

    function navigate(nav) {
      overlay.classList.add('visible');
      frame.src = URLS[nav];
      label.textContent = LABELS[nav];
      document.querySelectorAll('.tb-btn').forEach(x => x.classList.remove('active'));
      document.querySelector(`[data-nav="${nav}"]`).classList.add('active');
    }

    frame.addEventListener('load', () => overlay.classList.remove('visible'));

    document.querySelectorAll('.tb-btn').forEach(b =>
      b.addEventListener('click', () => navigate(b.dataset.nav))
    );
  </script>
</body>
</html>
