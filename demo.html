<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=375, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>네이버페이 스코어 · 데모</title>
<style>
  :root {
    --gray-150: #F3F5F7;
    --gray-600: #929294;
    --gray-700: #6F6F76;
    --gray-900: #1E1E23;
    --font-kr: "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body { background: #d9d9d9; }
  body { font-family: var(--font-kr); color: var(--gray-900); display: flex; justify-content: center; min-height: 100vh; }

  .device {
    width: 375px;
    height: 1100px;
    background: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.08);
  }
  .device iframe {
    width: 375px;
    height: 1100px;
    border: none;
    display: block;
  }

  /* ── Version toggle (identical to index.html) ── */
  .version-toggle {
    position: fixed;
    top: 16px; right: 16px;
    background: #fff;
    border-radius: 14px;
    padding: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.14);
    z-index: 100;
    font-family: var(--font-kr);
    min-width: 180px;
  }
  .vt-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
  }
  .vt-title {
    font-size: 10px; font-weight: 700; color: var(--gray-600);
    letter-spacing: 0.6px; text-transform: uppercase;
    grid-column: 1 / -1;
    padding: 0 4px 6px;
  }
  .vt-btn {
    padding: 7px 14px;
    border: none; background: transparent;
    font-size: 13px; font-weight: 600;
    color: var(--gray-700);
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: -0.3px;
    transition: background 0.15s ease, color 0.15s ease;
    white-space: nowrap;
    text-align: center;
    font-family: inherit;
  }
  .vt-btn.active { background: var(--gray-900); color: #fff; }
</style>
</head>
<body>

  <div class="version-toggle">
    <div class="vt-section">
      <div class="vt-title">케이스 전환</div>
      <button class="vt-btn" data-nav="main-pre">메인(생성전)</button>
      <button class="vt-btn active" data-nav="main-done">메인(생성완료)</button>
      <button class="vt-btn" data-nav="score-pre">스코어(생성전)</button>
      <button class="vt-btn" data-nav="score-done">스코어(생성완료)</button>
    </div>
  </div>

  <div class="device">
    <iframe id="demo-frame" src="https://swg2210.github.io/npscore-prototype/"></iframe>
  </div>

  <script>
    const URLS = {
      'main-pre':   'https://swg2210.github.io/npscore-prototype/?case=pre',
      'main-done':  'https://swg2210.github.io/npscore-prototype/',
      'score-pre':  'https://swg2210.github.io/socre/',
      'score-done': 'https://swg2210.github.io/socre/index.html?revealed=1'
    };
    const frame = document.getElementById('demo-frame');
    document.querySelectorAll('.vt-btn').forEach(b =>
      b.addEventListener('click', () => {
        document.querySelectorAll('.vt-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        frame.src = URLS[b.dataset.nav];
      })
    );
  </script>
</body>
</html>
